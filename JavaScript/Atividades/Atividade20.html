<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 20</title>
</head>

<body>
    <h1>Exemplo</h1>

    <label for="">Digite o seu nome: </label>
    <input type="text" id="nome" placeholder="Digite aqui o seu nome">

    <label for="">Digite o primeiro número: </label>
    <input type="number" id="n1" placeholder="Digite aqui o primeiro número">

    <label for="">Digite o segundo número: </label>
    <input type="number" id="n2" placeholder="Digite aqui o segundo número">

    <label for="">Digite o terceiro número: </label>
    <input type="number" id="n3" placeholder="Digite aqui o terceiro número">

    <button onclick="mostrar()">Mostrar</button>

    <p id="resultado"></p>
    
    <script>
        function mostrar() {
            let nome = document.getElementById('nome').value
            let n1 = Number(document.getElementById('n1').value)
            let n2 = Number(document.getElementById('n2').value)
            let n3 = Number(document.getElementById('n3').value)

            total = n1 * n2 * n3

            document.getElementById("resultado").innerHTML = "Olá " + nome + ", o resultado da multiplicação é: " + total
        }
    </script>

</body>

</html>
