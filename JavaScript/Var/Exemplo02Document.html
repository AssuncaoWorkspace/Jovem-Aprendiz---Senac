<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 02 Document (VAR)</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: gray;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 10px;
        }
        #resultado{
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
        </style>
</head>

<body>

    <h1>Exemplo VAR no Document</h1>

    <label for="">Digite o seu nome</label>
    <input type="text" name="" id="nome">

    <button onclick="mostrarNome()">Mostrar</button>

    <p id="Resultado"></p>

    <script>
        function mostrarNome() {
            var nome = document.getElementById("nome").value;
            document.getElementById("Resultado").innerHTML = "Olá, " + nome;
        }
    </script>

</body>

</html>
