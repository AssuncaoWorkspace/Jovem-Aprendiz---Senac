<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botão JS</title>
</head>

<body>
    <h1>Olá mundo!</h1>
    <p>Clique no botão para ver uma mensagem:</p>
    <button onclick="mensagem()">Clique aqui</button>

    <script>
        function mensagem() {
            window.alert('Eu estou aprendendo javaScript');
            window.alert('Estou gostando');
        }
    </script>
</body>

</html>
